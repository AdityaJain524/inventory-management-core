services:
  db:
    image: postgres:16-alpine
    container_name: coreinventory-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "rohit21"
      POSTGRES_DB: coreinventory
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
